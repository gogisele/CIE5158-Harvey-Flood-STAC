<!DOCTYPE html>
<html>
<head>
    <title>Skopje WebGIS Debugger - Gisele</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); font-family: sans-serif; font-size: 12px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        var map = L.map('map').setView([42.0, 21.43], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const dwColors = {
            0: "#419BDF", 1: "#397D49", 2: "#88B053", 3: "#7A87C6", 
            4: "#E49635", 5: "#E5D0A3", 6: "#C4281B", 7: "#A59B8F"
        };

        function getRainColor(v) {
            return v > 50 ? "#08306b" : v > 20 ? "#2171b5" : v > 5 ? "#6baed6" : null;
        }

        async function loadLayer(url, colorFn, opacity, name) {
            const res = await fetch(url);
            const ab = await res.arrayBuffer();
            const g = await parseGeoraster(ab);
            const layer = new GeoRasterLayer({
                georaster: g,
                opacity: opacity,
                pixelValuesToColorFn: v => {
                    if (v === null || v === 255 || v === 0) return null; // 把背景值直接拿掉
                    return colorFn(v) || "#FF00FF"; // 找不到顏色就變粉色
                },
                resolution: 128
            });

            // 💡 點擊偵測功能：點了粉色會告訴妳數值！
            map.on('click', function(e) {
                const val = geoblaze.identify(g, [e.latlng.lng, e.latlng.lat]);
                if (val) alert(`圖層: ${name}\n點擊位置數值為: ${val}`);
            });

            return layer;
        }

        // 引入 geoblaze 插件來幫忙偵測數值
        const script = document.createElement('script');
        script.src = "https://unpkg.com/geoblaze";
        document.head.appendChild(script);

        script.onload = () => {
            Promise.all([
                loadLayer("data/Precip_174_COG.tif", getRainColor, 0.4, "Rainfall"),
                loadLayer("data/LULC_174_COG.tif", v => dwColors[Math.round(v)], 0.8, "LULC")
            ]).then(layers => {
                layers.forEach(l => l && l.addTo(map));
                L.control.layers(null, { "降雨": layers[0], "土地利用": layers[1] }, {collapsed: false}).addTo(map);
                if (layers[1]) map.fitBounds(layers[1].getBounds());
            });
        };
    </script>
</body>
</html>
