<!DOCTYPE html>
<html>
<head>
    <title>Skopje Flood Analysis - Gisele</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        /* 圖例樣式 */
        .legend {
            background: white; padding: 12px; line-height: 18px; color: #333;
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: Arial, sans-serif;
        }
        .legend h4 { margin: 0 0 8px; font-size: 14px; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; opacity: 0.8; border: 1px solid #ccc; }
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        var map = L.map('map').setView([42.0, 21.43], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 配色定義
        const dwColors = {
            1: "#419BDF", 2: "#397D49", 3: "#88B053", 4: "#7A87C6", 
            5: "#E49635", 6: "#C4281B", 7: "#E5D0A3", 8: "#A59B8F"
        };
        const precipColor = "#08519c"; // 降雨用深藍色

        // 建立圖層函式 (加入除錯 log)
        async function loadLayer(url, colorFn, name) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                const georaster = await parseGeoraster(arrayBuffer);
                return new GeoRasterLayer({
                    georaster: georaster,
                    opacity: 0.6,
                    pixelValuesToColorFn: value => value > 0 ? colorFn(value) : null,
                    resolution: 128
                });
            } catch (e) {
                console.error(`無法載入圖層 ${name}:`, e);
                return null;
            }
        }

        // 同時執行載入
        Promise.all([
            loadLayer("data/LULC_174_COG.tif", v => dwColors[v] || "#cccccc", "LULC"),
            loadLayer("data/Precip_174_COG.tif", v => precipColor, "Rainfall")
        ]).then(layers => {
            const [lulc, rain] = layers;

            // 加入圖層控制開關
            var overlays = {};
            if (lulc) { lulc.addTo(map); overlays["土地利用 (LULC)"] = lulc; }
            if (rain) { rain.addTo(map); overlays["降雨分布 (Rainfall)"] = rain; }
            L.control.layers(null, overlays, { collapsed: false }).addTo(map);

            // 加入動態圖例 (Legend)
            var legend = L.control({position: 'bottomright'});
            legend.onAdd = function (map) {
                var div = L.DomUtil.create('div', 'legend');
                div.innerHTML = '<h4>圖例 Legend</h4>' +
                    '<div class="legend-item"><i style="background:#419BDF"></i> 水域 (Water)</div>' +
                    '<div class="legend-item"><i style="background:#397D49"></i> 森林 (Trees)</div>' +
                    '<div class="legend-item"><i style="background:#C4281B"></i> 建築 (Built Area)</div>' +
                    '<div class="legend-item"><i style="background:#E49635"></i> 農地 (Crops)</div>' +
                    '<div class="legend-item"><i style="background:#08519c; opacity: 0.5"></i> 累積降雨 (Precip)</div>';
                return div;
            };
            legend.addTo(map);

            if (lulc) map.fitBounds(lulc.getBounds());
        });
    </script>
</body>
</html>
