<!DOCTYPE html>
<html>
<head>
    <title>Skopje Flood Interactive Analysis</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #000; }
        .slider-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.9); padding: 15px;
            border-radius: 10px; width: 350px; text-align: center; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="slider-box">
        <div id="date-label" style="font-weight:bold; margin-bottom:10px;">日期: 載入中...</div>
        <input type="range" id="time-slider" min="0" max="2" step="1" value="0" style="width:100%;">
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        var map = L.map('map').setView([42.0, 21.43], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const timeline = [
            { date: "2015-07-20", s2: "data/S2_20150814.tif", flood: "data/Flood_20150720.tif" },
            { date: "2015-08-13", s2: "data/S2_20150814.tif", flood: "data/Flood_20150813.tif" },
            { date: "2016-08-07", s2: "data/S2_20160805.tif", flood: "data/Flood_20160807.tif" }
        ];

        // 圖層群組 (核心：避免清掉其他圖層)
        let dynamicGroup = L.layerGroup().addTo(map);

        async function loadCOG(url, type) {
            const res = await fetch(url);
            const g = await parseGeoraster(await res.arrayBuffer());
            return new GeoRasterLayer({
                georaster: g,
                opacity: type === 'flood' ? 0.8 : 0.6,
                pixelValuesToColorFn: v => {
                    if (type === 's2' || type === 'lulc') {
                        const r = Array.isArray(v) ? v[0] : v;
                        return r === 0 ? null : (Array.isArray(v) ? `rgb(${v[0]},${v[1]},${v[2]})` : `rgb(${v},${v},${v})`);
                    }
                    if (type === 'flood') return v > 0 ? "#00FFFF" : null;
                    if (type === 'rain') return v > 50 ? "#08306b" : v > 10 ? "#6baed6" : null;
                    return null;
                },
                resolution: 128
            });
        }

        async function update(index) {
            const data = timeline[index];
            document.getElementById("date-label").innerText = "觀測日期: " + data.date;
            
            dynamicGroup.clearLayers();
            const s2 = await loadCOG(data.s2, 's2');
            const flood = await loadCOG(data.flood, 'flood');
            s2.addTo(dynamicGroup);
            flood.addTo(dynamicGroup);
        }

        async function init() {
            const lulc = await loadCOG("data/LULC_174_COG.tif", 'lulc');
            const rain = await loadCOG("data/Precip_174_COG.tif", 'rain');
            
            await update(0);

            // 圖層選單
            L.control.layers(null, {
                "動態影像 (時序)": dynamicGroup,
                "土地利用 (LULC)": lulc,
                "降雨強度 (Rain)": rain
            }, { collapsed: false }).addTo(map);

            document.getElementById("time-slider").oninput = (e) => update(e.target.value);
        }

        init();
    </script>
</body>
</html>
