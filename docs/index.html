<script>
    // 妳的時序圖層現在變成了簡單的 TileLayer
    const timeline = [
        { d: "2015-07-20", s2: "tiles/s2_20150814/{z}/{x}/{y}.png", f: "tiles/flood_20150720/{z}/{x}/{y}.png" },
        { d: "2015-08-13", s2: "tiles/s2_20150814/{z}/{x}/{y}.png", f: "tiles/flood_20150813/{z}/{x}/{y}.png" },
        { d: "2016-08-07", s2: "tiles/s2_20160805/{z}/{x}/{y}.png", f: "tiles/flood_20160807/{z}/{x}/{y}.png" }
    ];

    let s2Layer, floodLayer;

    function update(i) {
        const item = timeline[i];
        document.getElementById("date-label").innerText = item.d;
        
        if(s2Layer) map.removeLayer(s2Layer);
        if(floodLayer) map.removeLayer(floodLayer);

        // 這是大數據最快路徑：XYZ Tiles
        s2Layer = L.tileLayer(item.s2, {tms: true, opacity: 0.7}).addTo(map);
        floodLayer = L.tileLayer(item.f, {tms: true, opacity: 0.9}).addTo(map);
    }
</script>
